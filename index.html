<script>
const page = document.getElementById('page');
const pb   = document.getElementById('pb');
const pf   = document.getElementById('pf');
const ptag = document.getElementById('ptag');
const phint= document.getElementById('phint');
const smsg = document.getElementById('smsg');
const spath= document.getElementById('spath');

let sel = null, pageCSS = '', hist = [], hidx = -1;

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   DEMO
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
const DEMO_CSS = `

body{font-family:Arial,sans-serif;color:#1e293b}

.cards{display:flex;gap:20px;padding:48px 32px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px;width:220px;text-align:center}

`;
const DEMO_HTML = `
<header>
  <span class="brand">MiSitio</span>
  <nav>

    <a href="/servicios">Servicios</a>

</header>
<section class="hero">
  <h1>Bienvenido a mi pأ،gina</h1>
  <p>Haz clic en cualquier elemento para editarlo. Imأ،genes, textos, colores, links â€” todo.</p>

</section>

  </div>
  <div class="card">

    <h3>Servicio Dos</h3>
    <p>Descripciأ³n del segundo servicio que ofreces.</p>
    <a class="btn" href="/servicio2">Ver mأ،s</a>
  </div>
  <div class="card">
    <a href="/servicio3"><img src="https://placehold.co/220x130/059669/fff?text=Imagen+3" alt="Servicio 3"></a>
    <h3>Servicio Tres</h3>
    <p>Descripciأ³n del tercer servicio que ofreces.</p>
    <a class="btn" href="/servicio3">Ver mأ،s</a>
  </div>
</div>
<footer>
  <p>آ© 2024 MiSitio &nbsp;|&nbsp; <a href="/privacidad">Privacidad</a> <a href="/terminos">Tأ©rminos</a></p>

function loadDemo(){ loadPage(DEMO_CSS, DEMO_HTML); }

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   LOAD / PARSE
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function loadPage(css, html){
  pageCSS = css;
  applyCSS(css);
  page.innerHTML = html;
  attachEvents();
  clearSel();
  pushH();
  smsg.textContent = 'âœ… Pأ،gina cargada â€” haz clic en cualquier elemento';
}

function loadFullHTML(full){
  const cssMatch = [...full.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)].map(m=>m[1]).join('\n');
  const bodyMatch = full.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  loadPage(cssMatch, bodyMatch ? bodyMatch[1] : full);
}

function applyCSS(css){
  let s = document.getElementById('page-css');
  if(!s){ s=document.createElement('style'); s.id='page-css'; document.head.appendChild(s); }
  // scope to #page
  s.textContent = css.replace(/([^{}]+)\{/g, (m, sel) => {
    if(sel.trim().startsWith('@')) return m;
    const parts = sel.split(',').map(p => {
      const t = p.trim();
      if(t==='body'||t==='html') return '#page';
      return '#page ' + t;
    });
    return parts.join(',') + '{';
  });
}

function getFullHTML(){
  return `<!DOCTYPE html>\n<html lang="es">\n<head>\n<meta charset="UTF-8">\n<title>Mi Pأ،gina</title>\n<style>\n${pageCSS}\n</style>\n</head>\n<body>\n${page.innerHTML}\n</body>\n</html>`;
}

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   HISTORY
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function pushH(){ hist=hist.slice(0,hidx+1); hist.push(page.innerHTML); hidx=hist.length-1; }
function doUndo(){ if(hidx>0){hidx--;page.innerHTML=hist[hidx];attachEvents();clearSel();smsg.textContent='â†© Deshecho';} }
function doRedo(){ if(hidx<hist.length-1){hidx++;page.innerHTML=hist[hidx];attachEvents();clearSel();smsg.textContent='â†ھ Rehecho';} }

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   EVENTS â€” clic en CUALQUIER elemento
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function attachEvents(){
  page.querySelectorAll('*').forEach(el => {
    el.addEventListener('click', onElClick, true); // capture phase = intercepta ANTES que el link
    el.addEventListener('mouseover', e=>{ e.stopPropagation(); if(el!==sel){ el.classList.add('HOV'); } });
    el.addEventListener('mouseout',  e=>{ el.classList.remove('HOV'); });
  });
}

function onElClick(e){
  e.preventDefault();
  e.stopPropagation();
  // Si tocaron una imagen, seleccionamos la imagen directamente aunque estأ© dentro de un <a>
  let target = e.target;
  pickEl(target);
}

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   SELECT
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function clearSel(){
  page.querySelectorAll('.SEL').forEach(e=>e.classList.remove('SEL'));
  sel=null; ptag.textContent='Sin selecciأ³n'; phint.textContent='haz clic en la pأ،gina â†’';
  pb.innerHTML='<div class="empty"><div class="ico">ًں‘†</div><div style="font-size:14px;font-weight:700;color:#475569">Haz clic en cualquier<br>elemento de la pأ،gina</div><div style="font-size:11px;margin-top:6px">Imagen آ· Texto آ· Link آ· Botأ³n<br>Verأ،s TODOS sus atributos aquأ­</div></div>';
  pf.style.display='none'; spath.textContent='';
}

function pickEl(el){
  page.querySelectorAll('.SEL').forEach(e=>e.classList.remove('SEL'));
  el.classList.add('SEL');
  sel=el;
  const tag=el.tagName.toLowerCase();
  ptag.textContent='<'+tag+'>'+(el.id?' #'+el.id:'');
  phint.textContent='';
  pf.style.display='flex';
  spath.textContent=breadcrumb(el);
  buildPanel(el);
  smsg.textContent='Seleccionado: <'+tag+'>'+(el.id?' #'+el.id:'');
}

function breadcrumb(el){
  const p=[]; let e=el;
  while(e&&e!==page){p.unshift(e.tagName.toLowerCase()+(e.id?'#'+e.id:''));e=e.parentElement;}
  return p.join(' â€؛ ');
}

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   BUILD PANEL
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function buildPanel(el){
  const tag = el.tagName.toLowerCase();
  const cs  = window.getComputedStyle(el);
  pb.innerHTML = '';

  /* â”€â”€ IMAGEN â”€â”€ */
  if(tag==='img'){
    const parentA = el.parentElement && el.parentElement.tagName==='A' ? el.parentElement : null;
    const src = el.getAttribute('src')||'';
    addSec('ًں–¼ï¸ڈ IMAGEN â€” Reemplazar & Link', true, `
      <div class="pf">
        <label>Vista previa</label>
        ${src?`<img id="pp-prev" src="${x(src)}" class="img-prev">`:''}
      </div>
      <div class="pf">
        <label>ًں”„ URL de la imagen <span class="badge">cambia esto para reemplazar la foto</span></label>
        <input type="text" id="pp-src" value="${x(src)}" placeholder="https://... o ruta/imagen.jpg">
      </div>
      <div class="pf">
        <label>ًں“پ O sube desde tu computadora</label>
        <div class="img-box" onclick="document.getElementById('img-fi').click()">ًں“‚ Seleccionar imagen del disco</div>
        <input type="file" id="img-fi" accept="image/*" style="display:none">
      </div>
      <div class="pf">
        <label>Texto alt (descripciأ³n)</label>
        <input type="text" id="pp-alt" value="${x(el.getAttribute('alt')||'')}" placeholder="Descripciأ³n de la imagen">

/* â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
   APPLY
â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ */
function applyAll(){
  if(!sel)return;
  const g=id=>document.getElementById(id), v=id=>{const e=g(id);return e?e.value.trim():''};
  const tag=sel.tagName.toLowerCase();

  // Imagen
  if(tag==='img'){
    if(v('pp-src'))sel.setAttribute('src',v('pp-src'));
    if(v('pp-alt')!==undefined)sel.setAttribute('alt',v('pp-alt'));
    // link
    const lnk=v('pp-link');
    const pa=sel.parentElement&&sel.parentElement.tagName==='A'?sel.parentElement:null;
    if(lnk){
      if(pa){pa.href=lnk;pa.target=v('pp-linktgt')||'';}
      else{const a=document.createElement('a');a.href=lnk;a.target=v('pp-linktgt')||'';sel.parentNode.insertBefore(a,sel);a.appendChild(sel);}
    } else if(pa&&!lnk){
      // quitar link
      pa.parentNode.insertBefore(sel,pa);pa.remove();
    }
    if(v('pp-w'))sel.style.width=v('pp-w');
    if(v('pp-h'))sel.style.height=v('pp-h');
    if(v('pp-rad'))sel.style.borderRadius=v('pp-rad');
  }

  // Link
  if(tag==='a'){
    if(v('pp-href'))sel.setAttribute('href',v('pp-href'));
    sel.target=v('pp-tgt')||'';
    if(v('pp-title'))sel.title=v('pp-title');
    if(g('pp-text')&&sel.childElementCount===0)sel.textContent=v('pp-text');
  }

  // Texto
  if(['h1','h2','h3','h4','h5','h6','p','span','li','td','th','strong','em','b','i','label','blockquote'].includes(tag)){
    if(g('pp-text')&&sel.childElementCount===0)sel.textContent=v('pp-text');
  }

  // Botأ³n
  if(tag==='button'){if(v('pp-text'))sel.textContent=v('pp-text');}

  // Input
  if(g('pp-placeholder'))sel.placeholder=v('pp-placeholder');
  if(g('pp-value'))sel.value=v('pp-value');
  if(g('pp-type')&&sel.type!==undefined)sel.type=v('pp-type');

  // innerHTML
  if(g('pp-inner')&&v('pp-inner'))sel.innerHTML=v('pp-inner');
  if(g('pp-html')&&v('pp-html'))sel.innerHTML=v('pp-html');

  // Estilos
  const st={
    color:v('pp-color'),backgroundColor:v('pp-bg'),borderColor:v('pp-bc'),opacity:v('pp-op'),
    fontSize:v('pp-fs'),fontWeight:v('pp-fw'),textAlign:v('pp-ta'),lineHeight:v('pp-lh'),fontFamily:v('pp-ff'),textDecoration:v('pp-td'),fontStyle:v('pp-fst'),
    width:v('pp-width'),height:v('pp-height'),maxWidth:v('pp-mxw'),minWidth:v('pp-mnw'),padding:v('pp-pad'),margin:v('pp-mar'),
    border:v('pp-bor'),borderRadius:v('pp-brad'),outline:v('pp-out'),boxShadow:v('pp-shad'),
    display:v('pp-disp'),position:v('pp-pos'),overflow:v('pp-ov'),zIndex:v('pp-z'),top:v('pp-top'),left:v('pp-left'),
    flexDirection:v('pp-fd'),justifyContent:v('pp-jc'),alignItems:v('pp-ai'),gap:v('pp-gap'),
    transform:v('pp-tf'),transition:v('pp-tr'),filter:v('pp-fil'),cursor:v('pp-cur'),
    backgroundSize:v('pp-bgs'),backgroundPosition:v('pp-bgp'),backgroundRepeat:v('pp-bgr'),
  };
  const bgi=v('pp-bgi');if(bgi)st.backgroundImage=`url('${bgi}')`;
  Object.entries(st).forEach(([k,val])=>{if(val)sel.style[k]=val;});

  // CSS libre
  const css=v('pp-css');
  if(css)css.split(';').forEach(r=>{const i=r.indexOf(':');if(i>0)sel.style[r.slice(0,i).trim()]=r.slice(i+1).trim();});

  if(v('pp-id'))sel.id=v('pp-id');
  if(v('pp-cls')){sel.className=v('pp-cls');sel.classList.add('SEL');}

  attachEvents(); pushH();
  smsg.textContent='âœ… Cambios aplicados';
}

function doUp(){if(!sel||!sel.previousElementSibling)return;sel.parentNode.insertBefore(sel,sel.previousElementSibling);attachEvents();pushH();}
function doDown(){if(!sel||!sel.nextElementSibling)return;sel.parentNode.insertBefore(sel.nextElementSibling,sel);attachEvents();pushH();}
